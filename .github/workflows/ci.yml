name: CI

on:
  push:
    branches: ["main"]
    tags: ["vscode-lfx-v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -timeout 300s ./...

  fuzz-smoke:
    name: Fuzz Smoke (short)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Fuzz - FuzzParser (5 s)
        run: go test -run='^$' -fuzz=FuzzParser -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzModuleGraph (5 s)
        run: go test -run='^$' -fuzz=FuzzModuleGraph -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzScalarExpressions (5 s)
        run: go test -run='^$' -fuzz=FuzzScalarExpressions -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzVectorExpressions (5 s)
        run: go test -run='^$' -fuzz=FuzzVectorExpressions -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzRuntimeBind (5 s)
        run: go test -run='^$' -fuzz=FuzzRuntimeBind -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzWGSLEmitter (5 s)
        run: go test -run='^$' -fuzz=FuzzWGSLEmitter -fuzztime=5s . 2>&1 || true

      - name: Fuzz - FuzzCPUDeterminism (5 s)
        run: go test -run='^$' -fuzz=FuzzCPUDeterminism -fuzztime=5s . 2>&1 || true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  vscode-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vscode-lfx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: vscode-lfx/pnpm-lock.yaml

      - name: Install extension dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundled LFX binaries
        working-directory: .
        run: |
          rm -rf vscode-lfx/bin/darwin-arm64 vscode-lfx/bin/darwin-x64 vscode-lfx/bin/linux-arm64 vscode-lfx/bin/linux-x64 vscode-lfx/bin/win32-x64
          mkdir -p vscode-lfx/bin/darwin-arm64 vscode-lfx/bin/darwin-x64 vscode-lfx/bin/linux-arm64 vscode-lfx/bin/linux-x64 vscode-lfx/bin/win32-x64

          GOOS=darwin GOARCH=arm64 go build -o vscode-lfx/bin/darwin-arm64/lfx ./cmd/lfx
          GOOS=darwin GOARCH=amd64 go build -o vscode-lfx/bin/darwin-x64/lfx ./cmd/lfx
          GOOS=linux GOARCH=arm64 go build -o vscode-lfx/bin/linux-arm64/lfx ./cmd/lfx
          GOOS=linux GOARCH=amd64 go build -o vscode-lfx/bin/linux-x64/lfx ./cmd/lfx
          GOOS=windows GOARCH=amd64 go build -o vscode-lfx/bin/win32-x64/lfx.exe ./cmd/lfx

      - name: Test extension
        run: pnpm test

      - name: Lint extension
        run: pnpm lint

      - name: Package extension
        run: pnpm dlx @vscode/vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-lfx-vsix
          path: vscode-lfx/*.vsix

  publish-vscode-extension:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: [test, fuzz-smoke, lint, vscode-extension]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-lfx-v')

    defaults:
      run:
        working-directory: vscode-lfx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: vscode-lfx/pnpm-lock.yaml

      - name: Install extension dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundled LFX binaries
        working-directory: .
        run: |
          rm -rf vscode-lfx/bin/darwin-arm64 vscode-lfx/bin/darwin-x64 vscode-lfx/bin/linux-arm64 vscode-lfx/bin/linux-x64 vscode-lfx/bin/win32-x64
          mkdir -p vscode-lfx/bin/darwin-arm64 vscode-lfx/bin/darwin-x64 vscode-lfx/bin/linux-arm64 vscode-lfx/bin/linux-x64 vscode-lfx/bin/win32-x64

          GOOS=darwin GOARCH=arm64 go build -o vscode-lfx/bin/darwin-arm64/lfx ./cmd/lfx
          GOOS=darwin GOARCH=amd64 go build -o vscode-lfx/bin/darwin-x64/lfx ./cmd/lfx
          GOOS=linux GOARCH=arm64 go build -o vscode-lfx/bin/linux-arm64/lfx ./cmd/lfx
          GOOS=linux GOARCH=amd64 go build -o vscode-lfx/bin/linux-x64/lfx ./cmd/lfx
          GOOS=windows GOARCH=amd64 go build -o vscode-lfx/bin/win32-x64/lfx.exe ./cmd/lfx

      - name: Test extension
        run: pnpm test

      - name: Lint extension
        run: pnpm lint

      - name: Package extension
        run: pnpm dlx @vscode/vsce package

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm dlx @vscode/vsce publish --packagePath "$(ls -1 *.vsix | head -n 1)"
      - name: Publish to Open VSX Registry
        env:
          OPENVSX_TOKEN: ${{ secrets.OPENVSX_TOKEN }}
        run: pnpm dlx ovsx publish --packagePath "$(ls -1 *.vsix | head -n 1)" --pat $OPENVSX_TOKEN
